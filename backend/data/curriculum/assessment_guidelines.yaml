# Assessment item & grading guidelines
# Aligned to Nepal CDC diagnostic structure, informed by CBSE/NCERT competency patterns
# (India Basic/Secondary — similar chapter flow to Nepal Grades 6–10)

framework_note: >
  Nepal CDC and Indian CBSE/NCERT share similar middle-school sequencing:
  algebra before quadratics, life/physical science split, English reading + grammar + writing.
  This file defines how items should be authored and scored on the platform — not official exam papers.

reference_boards:
  nepal: CDC National Curriculum (Grades 6–10)
  india: CBSE/NCERT (Classes 6–10) — used as structural reference only

item_types:
  english:
    reading_comprehension:
      marks: 1-2
      requires: context_text
      grading: answer_key or AI with passage
      cbse_parallel: Unseen passage (Section A)
    grammar_mcq:
      marks: 1
      requires: options OR explicit expected_answer
      grading: answer_key
      cbse_parallel: Gap filling / MCQ (Section B)
    grammar_correction:
      marks: 1-2
      grading: answer_key
    vocabulary:
      marks: 1-2
      grading: answer_key or keyword overlap
    guided_writing:
      marks: 5
      requires: rubric
      grading: AI rubric (5 criteria × 0-2)
      cbse_parallel: Short composition
    functional_writing:
      marks: 5
      requires: rubric
      cbse_parallel: Notice / letter / message
    essay_outline:
      marks: 3
      requires: rubric
      cbse_parallel: Long writing planning (CBSE Class 10)

  mathematics:
    numeric:
      marks: 1-3
      requires: expected_answer, answer_type numeric
      grading: deterministic numeric match
      cbse_parallel: Section B short answer
    word_problem:
      marks: 2-3
      requires: expected_answer
      grading: numeric or keyword
      cbse_parallel: Application / HOTS
    mcq:
      marks: 1
      requires: options, expected_answer
      cbse_parallel: Section A MCQ (competency based)

  science:
    recall:
      marks: 1
      requires: expected_answer
      grading: keyword overlap
      cbse_parallel: Very short answer
    explanation:
      marks: 2
      requires: expected_answer
      grading: keyword overlap or AI
    application:
      marks: 2-3
      requires: expected_answer numeric or text
      grading: formula/numeric or AI
      cbse_parallel: Numerical / reasoning

scoring:
  per_question_scale: [0, 0.5, 1]
  marks_weighted_overall: true
  proficiency_bands:
    - min_pct: 80
      label: Proficient
    - min_pct: 60
      label: Approaching
    - min_pct: 40
      label: Basic
    - min_pct: 0
      label: Needs Intensive Support
  weakness_bands:
    - min_pct: 85
      level: none
    - min_pct: 70
      level: mild
    - min_pct: 50
      level: moderate
    - min_pct: 0
      level: severe

authoring_rules:
  - Reading items MUST include passage text (context_text)
  - Writing items MUST include 5-criterion rubric
  - Math/science MUST include expected_answer where objectively gradable
  - Avoid "Draw and label" without rubric — use explanation type instead
  - Prefer Nepal/India school contexts (Rs., km, Himalaya, monsoon, panchayat)

generative_templates:
  enabled_subjects: [english, mathematics]
  mechanism: >
    Structured items and YAML registries define slot patterns (SVO grammar, equation coefficients).
    Generators swap subjects/verbs/objects or coefficients/variables and compute expected_answer
    deterministically — no LLM required for generation; Ollama still grades open items.
  english_slots: [subject, verb, object, transform]
  math_slots: [variable, coefficient_a, coefficient_b, constant_c, degree]
  item_field: generative_template
  registry_dir: backend/data/templates/
